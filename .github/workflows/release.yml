name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the version PR + git tags
      pull-requests: write # open/update the "Version Packages" PR
      id-token: write # npm trusted publishing (OIDC) + provenance attestation
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # No npm token: every package is configured with a Trusted Publisher on
      # npmjs.com (this repo + this workflow file), so `changeset publish` (which
      # calls `pnpm publish` under the hood; pnpm >= 10.13) authenticates via
      # GitHub's OIDC id-token — nothing to rotate, nothing to expire.

      # When changesets exist on main, opens a "Version Packages" PR. When that PR is
      # merged (versions bumped, changesets consumed), this run instead publishes.
      - uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
